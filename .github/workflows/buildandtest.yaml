name: build and test
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
      - develop
permissions:
  contents: read

jobs:

  buildandtest:
    name: Build and Test on Go ${{matrix.go}}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [ 'stable', 'oldstable' ]
        kernel: [ 'stable', '6.1' ]
    env:
      KERNEL: 'ghcr.io/cilium/ci-kernels:${{matrix.kernel}}'
      CGO_ENABLED: '0'
    steps:

      - name: Set up Go ${{matrix.go}}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{matrix.go}}
        id: go

      - name: Install Qemu
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends qemu-system-x86
          sudo chmod 0666 /dev/kvm

      - name: Install clang/llvm
        run: sudo apt-get install -y clang llvm

      - name: Install vimto
        run: go install lmb.io/vimto@latest

      - name: Check out code into the Go module directory
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Test
        run: |
          go env -w GOTOOLCHAIN=local
          go install github.com/cilium/ebpf/cmd/bpf2go@latest
          go generate .
          vimto -kernel ${KERNEL} -sudo -- go test -v .
